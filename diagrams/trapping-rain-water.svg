<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Trapping Rain Water diagram</title>
  <desc id="desc">A visual explanation of trapped rain water for height array 0,1,0,2,1,0,1,3,2,1,2,1, totaling 6 units.</desc>

  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67d8ff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#1687d9" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1280" height="780" fill="#111318"/>

  <text x="60" y="70" fill="#f7f7f7" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    接雨水
  </text>
  <text x="60" y="112" fill="#cfd6df" font-family="Arial, sans-serif" font-size="21">
    height = [0, 1, 0, 2, 1, 0, 1, 3, 2, 1, 2, 1]
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="145" width="1192" height="570" rx="16" fill="#191d24" stroke="#2e3440"/>
  </g>

  <!-- Grid -->
  <g stroke="#303744" stroke-width="1">
    <line x1="100" y1="605" x2="1088" y2="605"/>
    <line x1="100" y1="505" x2="1088" y2="505" opacity="0.45"/>
    <line x1="100" y1="405" x2="1088" y2="405" opacity="0.45"/>
    <line x1="100" y1="305" x2="1088" y2="305" opacity="0.45"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" fill="#98a4b3" text-anchor="end">
    <text x="86" y="610">0</text>
    <text x="86" y="510">1</text>
    <text x="86" y="410">2</text>
    <text x="86" y="310">3</text>
  </g>

  <!-- Water cells: total 6 units -->
  <g>
    <rect x="280" y="505" width="52" height="100" rx="8" fill="url(#water)"/>
    <rect x="440" y="405" width="52" height="100" rx="8" fill="url(#water)"/>
    <rect x="520" y="405" width="52" height="100" rx="8" fill="url(#water)"/>
    <rect x="520" y="505" width="52" height="100" rx="8" fill="url(#water)"/>
    <rect x="600" y="405" width="52" height="100" rx="8" fill="url(#water)"/>
    <rect x="840" y="405" width="52" height="100" rx="8" fill="url(#water)"/>
  </g>

  <!-- Bars -->
  <g fill="#8a93a2">
    <rect x="120" y="605" width="52" height="0" rx="8"/>
    <rect x="200" y="505" width="52" height="100" rx="8"/>
    <rect x="280" y="605" width="52" height="0" rx="8"/>
    <rect x="360" y="405" width="52" height="200" rx="8"/>
    <rect x="440" y="505" width="52" height="100" rx="8"/>
    <rect x="520" y="605" width="52" height="0" rx="8"/>
    <rect x="600" y="505" width="52" height="100" rx="8"/>
    <rect x="680" y="305" width="52" height="300" rx="8" fill="#75e06a"/>
    <rect x="760" y="405" width="52" height="200" rx="8"/>
    <rect x="840" y="505" width="52" height="100" rx="8"/>
    <rect x="920" y="405" width="52" height="200" rx="8" fill="#f8d84e"/>
    <rect x="1000" y="505" width="52" height="100" rx="8"/>
  </g>

  <!-- Values and indexes -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g fill="#dbe2eb" font-size="20" font-weight="700">
      <text x="146" y="635">0</text>
      <text x="226" y="492">1</text>
      <text x="306" y="635">0</text>
      <text x="386" y="392">2</text>
      <text x="466" y="492">1</text>
      <text x="546" y="635">0</text>
      <text x="626" y="492">1</text>
      <text x="706" y="292" fill="#dcffda">3</text>
      <text x="786" y="392">2</text>
      <text x="866" y="492">1</text>
      <text x="946" y="392" fill="#fff4a8">2</text>
      <text x="1026" y="492">1</text>
    </g>
    <g fill="#aeb7c3" font-size="18">
      <text x="146" y="665">0</text>
      <text x="226" y="665">1</text>
      <text x="306" y="665">2</text>
      <text x="386" y="665">3</text>
      <text x="466" y="665">4</text>
      <text x="546" y="665">5</text>
      <text x="626" y="665">6</text>
      <text x="706" y="665">7</text>
      <text x="786" y="665">8</text>
      <text x="866" y="665">9</text>
      <text x="946" y="665">10</text>
      <text x="1026" y="665">11</text>
    </g>
  </g>

  <!-- Focus callout for index 5 -->
  <g font-family="Arial, sans-serif">
    <rect x="765" y="170" width="410" height="116" rx="14" fill="#101318" stroke="#3b4250"/>
    <text x="790" y="207" fill="#f7f7f7" font-size="23" font-weight="800">看下标 5，高度是 0</text>
    <text x="790" y="242" fill="#dbe2eb" font-size="20">左边最高 = 2，右边最高 = 3</text>
    <text x="790" y="272" fill="#dbe2eb" font-size="20">能接水 = min(2, 3) - 0 = 2</text>
  </g>

  <path d="M785 286 C720 350, 620 430, 558 500" fill="none" stroke="#67d8ff" stroke-width="4" stroke-dasharray="8 8"/>
  <circle cx="546" cy="455" r="34" fill="none" stroke="#67d8ff" stroke-width="5"/>

  <!-- Total panel -->
  <g font-family="Arial, sans-serif">
    <rect x="82" y="180" width="410" height="92" rx="14" fill="#242a34" stroke="#3d4655"/>
    <text x="106" y="218" fill="#f7f7f7" font-size="23" font-weight="800">蓝色水块一共 6 格</text>
    <text x="106" y="252" fill="#dbe2eb" font-size="20">答案：6</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="82" y="685" width="840" height="48" rx="12" fill="#101318" stroke="#2e3440"/>
    <text x="106" y="716" fill="#f7f7f7" font-size="21" font-weight="700">
      重点：每个位置接水量 = min(左边最高, 右边最高) - 当前高度
    </text>
  </g>
</svg>
